sonar.projectKey=ecosense
sonar.projectName=EcoSense
sonar.projectVersion=1.0

sonar.sources=app/src/main/kotlin
sonar.tests=app/src/test/kotlin
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/build/**,**/.gradle/**,**/.idea/**,**/src/main/res/**,**/src/androidTest/**,**/*.png,**/*.jpg,**/*.webp,**/*.svg
sonar.test.inclusions=app/src/test/kotlin/**/*.kt

sonar.coverage.exclusions=app/src/main/kotlin/com/ecosense/ui/**,app/src/main/kotlin/com/ecosense/screen/**,app/src/main/kotlin/com/ecosense/presentation/**
